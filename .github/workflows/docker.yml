# 任意のレジストリに Docker image を公開orビルドする。
# プルリクの作成・更新時に動作する。

name: Docker

on:
  pull_request:
    branches:
      - main
      - master
    types:
      - opened
      - synchronize
    paths:
      - .github/workflows/docker.yml
  pull_request_target:
    branches:
      - main
      - master
    types:
      - opened
      - synchronize
      - reopened
      - closed

concurrency:
  # pull_request と pull_request_target が同一グループになると互いをキャンセルしてしまうため
  # event_name を含めることで両イベントのキャンセルを独立させる
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  post-approval-request:
    name: Post approval request
    runs-on: ubuntu-latest
    # フォーク PR のときのみ承認リクエストを投稿する（closed は不要）
    if: github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name != github.repository && github.event.action != 'closed'
    continue-on-error: true
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Find existing approval request comment
        id: find-comment
        uses: peter-evans/find-comment@b30e6a3c0ed37e7c023ccd3f1db5c6c0b0c23aad # v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: Environment 承認待ち

      - name: Post or update approval request comment
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          edit-mode: replace
          body: |
            ## Environment 承認待ち

            この PR のビルドを実行するには、Environment `fork-pr-build` の承認が必要です。

            [Actions run を確認して承認してください](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}?pr=${{ github.event.pull_request.number }})

  approval-gate:
    name: Approval gate
    runs-on: ubuntu-latest
    needs: post-approval-request
    # post-approval-request の結果に関わらず常に実行する
    if: always()
    # フォーク PR かつ closed でない場合のみ Environment で手動承認が必要
    environment: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name != github.repository && github.event.action != 'closed' && 'fork-pr-build' || '' }}
    permissions: {}
    steps:
      - name: Approval granted
        run: echo "Approval gate passed"

  docker-ci:
    name: Docker CI
    needs: approval-gate
    if: always() && needs.approval-gate.result == 'success' && (github.event.action != 'closed' || github.event.pull_request.merged == true)
    uses: book000/templates/.github/workflows/reusable-docker.yml@master
    with:
      targets: >-
        [
          { imageName: "book000/mitm-packet-sniffer", context: "mitmproxy-addon", file: "mitmproxy-addon/Dockerfile", packageName: "mitm-packet-sniffer" }
        ]
      platforms: linux/amd64,linux/arm64
      # pull_request_target 上のフォーク PR は、actions/checkout のセキュリティ制約により
      # デフォルトでは head SHA をチェックアウトできない。フォーク PR は上の approval-gate で
      # Environment（fork-pr-build）の手動承認を既に必須にしているため、承認済みの場合に限り
      # チェックアウトを許可する。
      allow-unsafe-pr-checkout: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name != github.repository }}
    secrets:
      DOCKER_USERNAME: ${{ github.actor }}
      DOCKER_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

  smoke-test:
    name: Smoke test
    needs: approval-gate
    if: always() && needs.approval-gate.result == 'success' && (github.event.action != 'closed' || github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Build images
        run: docker compose build

      - name: Start stack
        run: docker compose up -d

      - name: Wait for containers to stabilize
        run: sleep 60

      - name: Check mitmproxy container state
        run: |
          container_id=$(docker compose ps -q mitmproxy)
          if [ -z "$container_id" ]; then
            echo "::error::mitmproxy container was not created (docker compose ps -q returned empty)"
            docker compose ps
            exit 1
          fi
          state=$(docker inspect --format='{{json .State}}' "$container_id")
          echo "State: $state"
          running=$(echo "$state" | jq -r '.Running')
          restart_count=$(docker inspect --format='{{.RestartCount}}' "$container_id")
          echo "RestartCount: $restart_count"
          if [ "$running" != "true" ]; then
            echo "::error::mitmproxy container is not running"
            exit 1
          fi
          if [ "$restart_count" -gt 0 ]; then
            echo "::error::mitmproxy container has restarted $restart_count time(s), indicating a crash loop"
            exit 1
          fi

      - name: Show logs on failure
        if: failure()
        run: docker compose logs mitmproxy

      - name: Tear down stack
        if: always()
        run: docker compose down -v
