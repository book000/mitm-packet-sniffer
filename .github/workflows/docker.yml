# 任意のレジストリに Docker image を公開orビルドする。
# プルリクの作成・更新時に動作する。

name: Docker

on:
  pull_request:
    branches:
      - main
      - master
    types:
      - opened
      - synchronize
  pull_request_target:
    branches:
      - main
      - master
    types:
      - opened
      - synchronize
      - reopened
      - closed

concurrency:
  # pull_request と pull_request_target が同一グループになると互いをキャンセルしてしまうため
  # event_name を含めることで両イベントのキャンセルを独立させる
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  post-approval-request:
    name: Post approval request
    runs-on: ubuntu-latest
    # フォーク PR のときのみ承認リクエストを投稿する（closed は不要）
    if: github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name != github.repository && github.event.action != 'closed'
    continue-on-error: true
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Find existing approval request comment
        id: find-comment
        uses: peter-evans/find-comment@b30e6a3c0ed37e7c023ccd3f1db5c6c0b0c23aad # v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: Environment 承認待ち

      - name: Post or update approval request comment
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          edit-mode: replace
          body: |
            ## Environment 承認待ち

            この PR のビルドを実行するには、Environment `fork-pr-build` の承認が必要です。

            [Actions run を確認して承認してください](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}?pr=${{ github.event.pull_request.number }})

  approval-gate:
    name: Approval gate
    runs-on: ubuntu-latest
    needs: post-approval-request
    # post-approval-request の結果に関わらず常に実行する
    if: always()
    # フォーク PR かつ closed でない場合のみ Environment で手動承認が必要
    environment: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name != github.repository && github.event.action != 'closed' && 'fork-pr-build' || '' }}
    permissions: {}
    steps:
      - name: Approval granted
        run: echo "Approval gate passed"

  docker-ci:
    name: Docker CI
    needs: approval-gate
    # pull_request_target はフォーク PR の head SHA をチェックアウトできない
    # （GitHub のセキュリティ制約により actions/checkout が拒否するため）。
    # フォーク PR かつ未マージの場合は、下の docker-ci-fork-preview（権限が
    # 絞られた安全な pull_request トリガー側）にビルド検証を委ね、
    # このジョブはスキップする。
    if: >-
      always() &&
      needs.approval-gate.result == 'success' &&
      github.event_name == 'pull_request_target' &&
      (github.event.action != 'closed' || github.event.pull_request.merged == true) &&
      !(github.event.pull_request.head.repo.full_name != github.repository && github.event.pull_request.merged != true)
    uses: book000/templates/.github/workflows/reusable-docker.yml@249109e57d1bc836c5a4e1bbf4e446ad2c286deb # master
    with:
      targets: >-
        [
          { imageName: "book000/mitm-packet-sniffer", context: "mitmproxy-addon", file: "mitmproxy-addon/Dockerfile", packageName: "mitm-packet-sniffer" }
        ]
      platforms: linux/amd64,linux/arm64
    secrets:
      DOCKER_USERNAME: ${{ github.actor }}
      DOCKER_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

  docker-ci-fork-preview:
    name: Docker CI
    # フォーク PR は pull_request_target 側でビルド検証できないため、
    # 権限が絞られた安全な pull_request トリガーでビルド検証のみ行う
    # （is-merged は常に false になるため、レジストリへの push は発生しない）
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name != github.repository
    uses: book000/templates/.github/workflows/reusable-docker.yml@249109e57d1bc836c5a4e1bbf4e446ad2c286deb # master
    with:
      targets: >-
        [
          { imageName: "book000/mitm-packet-sniffer", context: "mitmproxy-addon", file: "mitmproxy-addon/Dockerfile", packageName: "mitm-packet-sniffer" }
        ]
      platforms: linux/amd64,linux/arm64
    secrets:
      DOCKER_USERNAME: ${{ github.actor }}
      DOCKER_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
